<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="シンプルで洗練されたデジタル時計アプリケーション">
  <title>Digital Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Chart.js core -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- Luxon (date library for Chart.js time scale) -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <!-- Chart.js Luxon adapter -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <!-- Chart.js Financial (candlestick / OHLC) -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background Chart Canvas (stealth) -->
  <canvas id="stealth-chart"></canvas>

  <!-- Clock Display -->
  <div id="clock-container">
    <div id="date-display"></div>
    <div id="time-display">00:00:00</div>
    <div id="ticker-hint"></div>
  </div>

  <!-- Data source indicator -->
  <div id="data-source"></div>

  <!-- Settings Trigger (bottom-right corner) -->
  <div id="settings-trigger" title="Settings">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="settings-close">&times;</button>
    </div>
    <div class="settings-body">
      <label for="ticker-input">Ticker Symbol</label>
      <input type="text" id="ticker-input" placeholder="e.g. 7203.T, 9984.T" spellcheck="false" autocomplete="off">
      <div class="ticker-examples">
        <span class="ticker-tag" data-ticker="7203.T">トヨタ</span>
        <span class="ticker-tag" data-ticker="9984.T">SBG</span>
        <span class="ticker-tag" data-ticker="6758.T">ソニー</span>
        <span class="ticker-tag" data-ticker="^N225">日経225</span>
      </div>

      <label for="chart-color">Chart Color</label>
      <select id="chart-color">
        <option value="cyan">Cyan</option>
        <option value="green">Green</option>
        <option value="amber">Amber</option>
        <option value="magenta">Magenta</option>
        <option value="white">White</option>
      </select>

      <label for="chart-opacity">Visibility</label>
      <input type="range" id="chart-opacity" min="5" max="50" value="18">
      <span id="opacity-value">18%</span>

      <label for="update-interval">Update Interval</label>
      <select id="update-interval">
        <option value="10">10 sec</option>
        <option value="30" selected>30 sec</option>
        <option value="60">1 min</option>
        <option value="300">5 min</option>
      </select>

      <button id="apply-settings" class="btn-apply">Apply</button>
    </div>
  </div>

  <!-- Overlay to close settings when clicking outside -->
  <div id="settings-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
